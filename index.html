<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển hướng...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #FFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: #2f3640;
        }
        .spinner {
            border: 4px solid #e5e7eb;
            border-radius: 50%;
            border-top: 4px solid #4b5563;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1rem;
            color: #5b6470;
        }
        .fallback {
            margin-top: 30px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }
        .fallback a {
            color: #374151;
            text-decoration: underline;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Đang mở trình duyệt...</h1>
        <p id="status">Vui lòng chờ trong giây lát</p>
        
        <div class="fallback" id="fallback" style="display: none;">
            <p>Nếu không tự động mở, <a href="#" id="manualLink">nhấn vào đây</a></p>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const fallbackEl = document.getElementById('fallback');
        const manualLinkEl = document.getElementById('manualLink');
        const searchParams = new URLSearchParams(window.location.search);
        const targetUrl = searchParams.get('url') || searchParams.get('targetUrl') || searchParams.get('target');
        const userAgent = navigator.userAgent || '';
        const isAndroid = /Android/i.test(userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(userAgent);
        let pageWasHidden = false;

        function detectBrowserContext(ua) {
            const lowerUA = ua.toLowerCase();
            const browser = {
                name: 'Unknown',
                isInApp: false,
                isChrome: /crios|chrome/i.test(ua) && !/edg|opr|samsungbrowser|duckduckgo/i.test(ua),
                isSafari: /safari/i.test(ua) && !/crios|chrome|fxios|edgios|edga|edg|opr|opt\/|samsungbrowser/i.test(ua),
                isFirefox: /fxios|firefox/i.test(ua),
                isEdge: /edgios|edga|edg/i.test(ua),
                isSamsungInternet: /samsungbrowser/i.test(ua),
                isOpera: /opr|opt\//i.test(ua),
                isDuckDuckGo: /duckduckgo/i.test(ua),
            };

            const inAppRules = [
                { name: 'Messenger', test: /messenger/i },
                { name: 'Facebook', test: /fban|fbav/i },
                { name: 'Instagram', test: /instagram/i },
                { name: 'Zalo', test: /zalo/i },
                { name: 'TikTok', test: /tiktok|musical_ly|bytedancewebview/i },
                { name: 'Telegram', test: /telegram/i },
                { name: 'WhatsApp', test: /whatsapp/i },
                { name: 'LINE', test: / line\//i },
                { name: 'WeChat', test: /micromessenger/i },
                { name: 'LinkedIn', test: /linkedinapp/i },
                { name: 'Snapchat', test: /snapchat/i },
            ];

            for (const rule of inAppRules) {
                if (rule.test.test(ua)) {
                    browser.name = rule.name;
                    browser.isInApp = true;
                    return browser;
                }
            }

            if (browser.isChrome) {
                browser.name = 'Chrome';
            } else if (browser.isSafari) {
                browser.name = 'Safari';
            } else if (browser.isFirefox) {
                browser.name = 'Firefox';
            } else if (browser.isEdge) {
                browser.name = 'Edge';
            } else if (browser.isSamsungInternet) {
                browser.name = 'Samsung Internet';
            } else if (browser.isOpera) {
                browser.name = 'Opera';
            } else if (browser.isDuckDuckGo) {
                browser.name = 'DuckDuckGo';
            } else if (lowerUA.includes('wv')) {
                browser.name = 'Android WebView';
                browser.isInApp = true;
            }

            return browser;
        }

        const browserContext = detectBrowserContext(userAgent);

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                pageWasHidden = true;
            }
        });

        window.addEventListener('pagehide', () => {
            pageWasHidden = true;
        });

        function showFallback(message, linkHref, linkText = 'nhấn vào đây') {
            // statusEl.textContent = message;
            manualLinkEl.href = linkHref;
            // manualLinkEl.textContent = linkText;
            // fallbackEl.style.display = 'block';
        }

        function redirectToTarget() {
            if (!pageWasHidden && document.visibilityState === 'visible') {
                window.location.href = targetUrl;
            }
        }

        function openChromeOnIOS(chromeUrl) {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = chromeUrl;
            document.body.appendChild(iframe);

            setTimeout(() => {
                iframe.remove();
            }, 1000);
        }

        if (!targetUrl) {
            showFallback('Thiếu tham số url trên query string', '#', 'thêm ?url=https://example.com');
        } else {
            let parsedTarget;

            try {
                parsedTarget = new URL(targetUrl);
            } catch (error) {
                showFallback('Giá trị url không hợp lệ', '#', 'kiểm tra lại tham số url');
            }

            if (parsedTarget) {
                let intentUrl;

                if (!browserContext.isInApp) {
                    statusEl.textContent = `Đang mở liên kết trong ${browserContext.name}...`;
                    window.location.href = targetUrl;
                } else if (isAndroid) {
                    intentUrl = `intent://${parsedTarget.host}${parsedTarget.pathname}${parsedTarget.search}#Intent;scheme=${parsedTarget.protocol.replace(':', '')};package=com.android.chrome;S.browser_fallback_url=${encodeURIComponent(targetUrl)};end`;
                    manualLinkEl.href = targetUrl;
                    window.location.href = intentUrl;

                    setTimeout(() => {
                        showFallback(`Nếu ${browserContext.name} chưa mở trình duyệt ngoài, hãy dùng liên kết bên dưới`, targetUrl);
                    }, 3000);

                    setTimeout(() => {
                        redirectToTarget();
                    }, 5000);
                } else if (isIOS) {
                    intentUrl = targetUrl.replace(/^https:\/\//i, 'googlechromes://').replace(/^http:\/\//i, 'googlechrome://');
                    manualLinkEl.href = targetUrl;
                    openChromeOnIOS(intentUrl);

                    setTimeout(() => {
                        showFallback(`Nếu ${browserContext.name} không chuyển được sang trình duyệt ngoài, hãy mở liên kết trực tiếp bên dưới`, targetUrl);
                    }, 1200);

                    setTimeout(() => {
                        redirectToTarget();
                    }, 1600);
                } else {
                    window.location.href = targetUrl;
                }
            }
        }
    </script>
</body>
</html>
