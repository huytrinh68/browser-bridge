<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển hướng...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #FFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: #2f3640;
            width: 100%;
            max-width: 420px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1rem;
            color: #5b6470;
        }
        .fallback {
            margin-top: 30px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }
        .fallback a {
            color: #374151;
            text-decoration: underline;
            font-weight: 600;
        }
        .actions {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .button {
            display: block;
            padding: 14px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .button-primary {
            background: #1f2937;
            color: #fff;
            border: 1px solid #1f2937;
        }
        .button-secondary {
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
        }
        .note {
            margin-top: 16px;
            font-size: 0.95rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Chọn cách mở liên kết</h1>
        <p id="status">Trang này không tự động chuyển hướng để tránh lỗi lặp trên iPhone và in-app browser.</p>
        
        <div class="fallback" id="fallback">
            <div class="actions">
                <a href="#" id="primaryLink" class="button button-primary">Mở bằng Chrome</a>
                <a href="#" id="secondaryLink" class="button button-secondary">Mở liên kết trực tiếp</a>
            </div>
            <p class="note" id="note">Nếu nút đầu không hoạt động, hãy dùng nút còn lại.</p>
            <p class="note"><a href="#" id="manualLink">Mở liên kết gốc</a></p>
        </div>
    </div>

    <script>
        const titleEl = document.getElementById('title');
        const statusEl = document.getElementById('status');
        const primaryLinkEl = document.getElementById('primaryLink');
        const secondaryLinkEl = document.getElementById('secondaryLink');
        const noteEl = document.getElementById('note');
        const manualLinkEl = document.getElementById('manualLink');
        const searchParams = new URLSearchParams(window.location.search);
        const targetUrl = searchParams.get('url') || searchParams.get('targetUrl') || searchParams.get('target');
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

        if (!targetUrl) {
            titleEl.textContent = 'Thiếu liên kết đích';
            statusEl.textContent = 'Thêm tham số ?url=https://example.com vào URL của trang này.';
            primaryLinkEl.href = '#';
            secondaryLinkEl.href = '#';
            manualLinkEl.href = '#';
        } else {
            let parsedTarget;

            try {
                parsedTarget = new URL(targetUrl);
            } catch (error) {
                titleEl.textContent = 'Liên kết không hợp lệ';
                statusEl.textContent = 'Giá trị trong tham số url không đúng định dạng.';
                primaryLinkEl.href = '#';
                secondaryLinkEl.href = '#';
                manualLinkEl.href = '#';
            }

            if (parsedTarget) {
                manualLinkEl.href = targetUrl;
                const chromeUrl = targetUrl.replace(/^https:\/\//i, 'googlechromes://').replace(/^http:\/\//i, 'googlechrome://');
                const safariUrl = targetUrl.replace(/^https:\/\//i, 'x-safari-https://').replace(/^http:\/\//i, 'x-safari-http://');
                const androidChromeUrl = `intent://${parsedTarget.host}${parsedTarget.pathname}${parsedTarget.search}#Intent;scheme=${parsedTarget.protocol.replace(':', '')};package=com.android.chrome;S.browser_fallback_url=${encodeURIComponent(targetUrl)};end`;
                const androidBrowserUrl = `intent://${parsedTarget.host}${parsedTarget.pathname}${parsedTarget.search}#Intent;scheme=${parsedTarget.protocol.replace(':', '')};S.browser_fallback_url=${encodeURIComponent(targetUrl)};end`;

                if (isIOS) {
                    titleEl.textContent = 'Chọn trình duyệt để mở';
                    statusEl.textContent = 'Trên iPhone/iPad, cách ổn định hơn là tự chọn trình duyệt thay vì tự động chuyển hướng.';
                    primaryLinkEl.href = chromeUrl;
                    primaryLinkEl.textContent = 'Mở bằng Chrome';
                    secondaryLinkEl.href = safariUrl;
                    secondaryLinkEl.textContent = 'Mở bằng Safari';
                    noteEl.textContent = 'Nếu máy không có Chrome, hãy dùng nút Safari.';
                } else if (isAndroid) {
                    titleEl.textContent = 'Chọn trình duyệt để mở';
                    statusEl.textContent = 'Trên Android, bạn có thể mở bằng Chrome hoặc thử một trình duyệt khác trên thiết bị.';
                    primaryLinkEl.href = androidChromeUrl;
                    primaryLinkEl.textContent = 'Mở bằng Chrome';
                    secondaryLinkEl.href = androidBrowserUrl;
                    secondaryLinkEl.textContent = 'Mở bằng trình duyệt khác';
                    noteEl.textContent = 'Nếu Chrome không có hoặc không hoạt động, hãy thử nút trình duyệt khác.';
                } else {
                    titleEl.textContent = 'Mở liên kết';
                    statusEl.textContent = 'Trên desktop không cần xử lý chuyển hướng đặc biệt.';
                    primaryLinkEl.href = targetUrl;
                    primaryLinkEl.textContent = 'Mở liên kết';
                    secondaryLinkEl.href = targetUrl;
                    secondaryLinkEl.textContent = 'Mở trong tab hiện tại';
                    noteEl.textContent = 'Hai nút đều dẫn tới cùng một liên kết.';
                }
            }
        }
    </script>
</body>
</html>
