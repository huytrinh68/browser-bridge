<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển hướng...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #FFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: #2f3640;
        }
        .spinner {
            border: 4px solid #e5e7eb;
            border-radius: 50%;
            border-top: 4px solid #4b5563;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1rem;
            color: #5b6470;
        }
        .fallback {
            margin-top: 30px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }
        .fallback a {
            color: #374151;
            text-decoration: underline;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Đang mở trình duyệt...</h1>
        <p id="status">Vui lòng chờ trong giây lát</p>
        
        <div class="fallback" id="fallback" style="display: none;">
            <p>Nếu không tự động mở, <a href="#" id="manualLink">nhấn vào đây</a></p>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const fallbackEl = document.getElementById('fallback');
        const manualLinkEl = document.getElementById('manualLink');
        const searchParams = new URLSearchParams(window.location.search);
        const targetUrl = searchParams.get('url') || searchParams.get('targetUrl') || searchParams.get('target');
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

        if (!targetUrl) {
            manualLinkEl.href = '#';
        } else {
            let parsedTarget;

            try {
                parsedTarget = new URL(targetUrl);
            } catch (error) {
                manualLinkEl.href = '#';
            }

            if (parsedTarget) {
                let intentUrl;
                let chromeUrl;
                let safariUrl;

                if (isAndroid) {
                    // Android Intent URL for Chrome
                    intentUrl = `intent://${parsedTarget.host}${parsedTarget.pathname}${parsedTarget.search}#Intent;scheme=${parsedTarget.protocol.replace(':', '')};package=com.android.chrome;S.browser_fallback_url=${encodeURIComponent(targetUrl)};end`;
                } else if (isIOS) {
                    chromeUrl = targetUrl.replace(/^https:\/\//i, 'googlechromes://').replace(/^http:\/\//i, 'googlechrome://');
                    safariUrl = targetUrl.replace(/^https:\/\//i, 'x-safari-https://').replace(/^http:\/\//i, 'x-safari-http://');
                } else {
                    // Desktop - direct redirect
                    intentUrl = targetUrl;
                }

                // Set manual link
                manualLinkEl.href = targetUrl;

                // Immediate redirect
                if (isIOS) {
                    window.location.href = chromeUrl;

                    setTimeout(() => {
                        if (document.visibilityState === 'visible') {
                            window.location.href = safariUrl;
                        }
                    }, 800);
                } else {
                    window.location.href = intentUrl;
                }

                // Show fallback after 3 seconds
                setTimeout(() => {
                    statusEl.textContent = 'Đang chờ xác nhận...';
                    fallbackEl.style.display = 'block';
                }, 3000);

                // Fallback to direct URL after 5 seconds if still on page
                setTimeout(() => {
                    if (document.visibilityState === 'visible') {
                        window.location.href = targetUrl;
                    }
                }, 5000);
            }
        }
    </script>
</body>
</html>
