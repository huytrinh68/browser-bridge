<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển hướng...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #FFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: #2f3640;
        }
        .spinner {
            border: 4px solid #e5e7eb;
            border-radius: 50%;
            border-top: 4px solid #4b5563;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1rem;
            color: #5b6470;
        }
        .fallback {
            margin-top: 30px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }
        .fallback a {
            color: #374151;
            text-decoration: underline;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Đang mở trình duyệt...</h1>
        <p id="status">Vui lòng chờ trong giây lát</p>
        
        <div class="fallback" id="fallback" style="display: none;">
            <p>Nếu không tự động mở, <a href="#" id="manualLink">nhấn vào đây</a></p>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const fallbackEl = document.getElementById('fallback');
        const manualLinkEl = document.getElementById('manualLink');
        const searchParams = new URLSearchParams(window.location.search);
        const targetUrl = searchParams.get('url') || searchParams.get('targetUrl') || searchParams.get('target');
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        let pageWasHidden = false;

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                pageWasHidden = true;
            }
        });

        window.addEventListener('pagehide', () => {
            pageWasHidden = true;
        });

        function showFallback(message, linkHref, linkText = 'nhấn vào đây') {
            statusEl.textContent = message;
            manualLinkEl.href = linkHref;
            manualLinkEl.textContent = linkText;
            fallbackEl.style.display = 'block';
        }

        function redirectToTarget() {
            if (!pageWasHidden && document.visibilityState === 'visible') {
                window.location.href = targetUrl;
            }
        }

        function openChromeOnIOS(chromeUrl) {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = chromeUrl;
            document.body.appendChild(iframe);

            setTimeout(() => {
                iframe.remove();
            }, 1000);
        }

        if (!targetUrl) {
            showFallback('Thiếu tham số url trên query string', '#', 'thêm ?url=https://example.com');
        } else {
            let parsedTarget;

            try {
                parsedTarget = new URL(targetUrl);
            } catch (error) {
                showFallback('Giá trị url không hợp lệ', '#', 'kiểm tra lại tham số url');
            }

            if (parsedTarget) {
                let intentUrl;

                if (isAndroid) {
                    intentUrl = `intent://${parsedTarget.host}${parsedTarget.pathname}${parsedTarget.search}#Intent;scheme=${parsedTarget.protocol.replace(':', '')};package=com.android.chrome;S.browser_fallback_url=${encodeURIComponent(targetUrl)};end`;
                    manualLinkEl.href = targetUrl;
                    window.location.href = intentUrl;

                    setTimeout(() => {
                        showFallback('Đang chờ xác nhận...', targetUrl);
                    }, 3000);

                    setTimeout(() => {
                        redirectToTarget();
                    }, 5000);
                } else if (isIOS) {
                    intentUrl = targetUrl.replace(/^https:\/\//i, 'googlechromes://').replace(/^http:\/\//i, 'googlechrome://');
                    manualLinkEl.href = targetUrl;
                    openChromeOnIOS(intentUrl);

                    setTimeout(() => {
                        showFallback('Nếu Chrome không có sẵn, hãy mở liên kết trực tiếp bên dưới', targetUrl);
                    }, 1200);

                    setTimeout(() => {
                        redirectToTarget();
                    }, 1600);
                } else {
                    window.location.href = targetUrl;
                }
            }
        }
    </script>
</body>
</html>
