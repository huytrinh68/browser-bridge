<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển hướng...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #FFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: #2f3640;
        }
        .spinner {
            border: 4px solid #e5e7eb;
            border-radius: 50%;
            border-top: 4px solid #4b5563;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1rem;
            color: #5b6470;
        }
        .fallback {
            margin-top: 30px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }
        .fallback a {
            color: #374151;
            text-decoration: underline;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Đang mở trình duyệt...</h1>
        <p id="status">Vui lòng chờ trong giây lát</p>
        
        <div class="fallback" id="fallback" style="display: none;">
            <p>Nếu không tự động mở, <a href="#" id="manualLink">nhấn vào đây</a></p>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const fallbackEl = document.getElementById('fallback');
        const manualLinkEl = document.getElementById('manualLink');
        const searchParams = new URLSearchParams(window.location.search);
        const targetUrl = searchParams.get('url') || searchParams.get('targetUrl') || searchParams.get('target');
        const attempt = Math.max(Number.parseInt(searchParams.get('_attempt') || '0', 10) || 0, 0);
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

        function showFallback(message, linkHref, linkText = 'nhấn vào đây') {
            statusEl.textContent = message;
            manualLinkEl.href = linkHref;
            manualLinkEl.textContent = linkText;
            fallbackEl.style.display = 'block';
        }

        function buildRetryUrl(nextAttempt) {
            const retryParams = new URLSearchParams(window.location.search);
            retryParams.set('_attempt', String(nextAttempt));
            return `${window.location.pathname}?${retryParams.toString()}`;
        }

        function getIOSCandidates(url) {
            return [
                {
                    name: 'Chrome',
                    openUrl: url.replace(/^https:\/\//i, 'googlechromes://').replace(/^http:\/\//i, 'googlechrome://'),
                },
                {
                    name: 'Firefox',
                    openUrl: `firefox://open-url?url=${encodeURIComponent(url)}`,
                },
                {
                    name: 'Opera',
                    openUrl: url.replace(/^https:\/\//i, 'opera-https://').replace(/^http:\/\//i, 'opera-http://'),
                },
            ];
        }

        function getAndroidCandidates(parsedUrl) {
            return [
                {
                    name: 'Chrome',
                    openUrl: `intent://${parsedUrl.host}${parsedUrl.pathname}${parsedUrl.search}#Intent;scheme=${parsedUrl.protocol.replace(':', '')};package=com.android.chrome;end`,
                },
                {
                    name: 'Firefox',
                    openUrl: `intent://${parsedUrl.host}${parsedUrl.pathname}${parsedUrl.search}#Intent;scheme=${parsedUrl.protocol.replace(':', '')};package=org.mozilla.firefox;end`,
                },
                {
                    name: 'Opera',
                    openUrl: `intent://${parsedUrl.host}${parsedUrl.pathname}${parsedUrl.search}#Intent;scheme=${parsedUrl.protocol.replace(':', '')};package=com.opera.browser;end`,
                },
                {
                    name: 'UC Browser',
                    openUrl: `intent://${parsedUrl.host}${parsedUrl.pathname}${parsedUrl.search}#Intent;scheme=${parsedUrl.protocol.replace(':', '')};package=com.UCMobile.intl;end`,
                },
                {
                    name: 'Samsung Internet',
                    openUrl: `intent://${parsedUrl.host}${parsedUrl.pathname}${parsedUrl.search}#Intent;scheme=${parsedUrl.protocol.replace(':', '')};package=com.sec.android.app.sbrowser;end`,
                },
            ];
        }

        if (!targetUrl) {
            statusEl.textContent = 'Thiếu tham số url trên query string';
            fallbackEl.style.display = 'block';
            manualLinkEl.href = '#';
            manualLinkEl.textContent = 'thêm ?url=https://example.com';
        } else {
            let parsedTarget;

            try {
                parsedTarget = new URL(targetUrl);
            } catch (error) {
                statusEl.textContent = 'Giá trị url không hợp lệ';
                fallbackEl.style.display = 'block';
                manualLinkEl.href = '#';
                manualLinkEl.textContent = 'kiểm tra lại tham số url';
            }

            if (parsedTarget) {
                let candidates = [];

                if (isAndroid) {
                    candidates = getAndroidCandidates(parsedTarget);
                } else if (isIOS) {
                    candidates = getIOSCandidates(targetUrl);
                } else {
                    // Desktop - direct redirect
                    candidates = [{ name: 'Trình duyệt mặc định', openUrl: targetUrl }];
                }

                const currentCandidate = candidates[attempt];
                const nextAttempt = attempt + 1;

                if (!currentCandidate) {
                    showFallback('Không còn trình duyệt nào để thử. Mở liên kết trực tiếp bên dưới', targetUrl);
                    setTimeout(() => {
                        if (document.visibilityState === 'visible') {
                            window.location.href = targetUrl;
                        }
                    }, 300);
                    return;
                }

                manualLinkEl.href = targetUrl;

                if (attempt > 0) {
                    statusEl.textContent = `Đang thử mở bằng ${currentCandidate.name}...`;
                }

                window.location.href = currentCandidate.openUrl;

                setTimeout(() => {
                    if (document.visibilityState === 'visible') {
                        if (nextAttempt < candidates.length) {
                            window.location.replace(buildRetryUrl(nextAttempt));
                        } else {
                            showFallback('Không mở được các trình duyệt đã thử. Mở liên kết trực tiếp bên dưới', targetUrl);
                            setTimeout(() => {
                                if (document.visibilityState === 'visible') {
                                    window.location.href = targetUrl;
                                }
                            }, 300);
                        }
                    }
                }, isIOS ? 900 : 1200);

                setTimeout(() => {
                    if (document.visibilityState === 'visible') {
                        const nextBrowserName = candidates[nextAttempt] ? candidates[nextAttempt].name : 'liên kết trực tiếp';
                        showFallback(`Nếu chưa mở được, hệ thống sẽ thử ${nextBrowserName}`, targetUrl);
                    }
                }, isIOS ? 400 : 700);
            }
        }
    </script>
</body>
</html>
